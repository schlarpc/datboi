<!doctype html>
<!-- D84 milestone-2 bare test page: NOT part of the datboi web UI (that
     integration is milestone 3, docs/88-emulation.md). Drives the core
     purely through the worker protocol (asset/worker.js + descriptor.json)
     so it doubles as the protocol's reference host. Serve the nix build
     output directory and open /?rom=<url> or pick a file.
     ?bench=<seconds> holds the load event open that long (headless
     screenshots then capture the fps line); ?stress=<frames> measures
     flat-out throughput through the protocol. -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>datboi-emu-ds test page</title>
<style>
  body { background: #111; color: #ddd; font: 14px monospace; text-align: center; }
  canvas { image-rendering: pixelated; margin-top: 8px; }
  #status { margin: 8px; }
</style>
</head>
<body>
<div id="status">pick a .nds file or pass ?rom=&lt;same-origin url&gt;</div>
<input type="file" id="rom" accept=".nds">
<br>
<canvas id="screen"></canvas>
<script type="module">
const status = document.getElementById("status");
const canvas = document.getElementById("screen");

const descriptor = await (await fetch("descriptor.json")).json();
const W = Math.max(...descriptor.screens.map((s) => s.width));
const H = descriptor.screens.reduce((a, s) => a + s.height, 0);
const pointerTop = descriptor.screens
  .slice(0, descriptor.pointerScreen)
  .reduce((a, s) => a + s.height, 0);
canvas.width = W;
canvas.height = H;
canvas.style.width = `${W * 2}px`;
canvas.style.height = `${H * 2}px`;

const ctx = canvas.getContext("2d");
const image = ctx.createImageData(W, H);
const image32 = new Uint32Array(image.data.buffer);

// e.code → descriptor button name; bits come from the descriptor.
const KEYMAP = {
  KeyX: "a", KeyZ: "b", Backspace: "select", Enter: "start",
  ArrowRight: "right", ArrowLeft: "left", ArrowUp: "up", ArrowDown: "down",
  KeyW: "r", KeyQ: "l", KeyS: "x", KeyA: "y",
};

let worker;
let buttons = 0;
let touch = null;
let frames = 0;
let audioSamples = 0;
let lastTick = performance.now();
let stressDone; // resolves when a stressResult lands

function sendInput() {
  worker.postMessage({ type: "input", buttons, touch });
}

function start(romBytes) {
  worker = new Worker("worker.js", { type: "module" });
  worker.onmessage = (e) => {
    const msg = e.data;
    switch (msg.type) {
      case "loaded":
        status.textContent = "running";
        break;
      case "error":
        status.textContent = `error: ${msg.message}`;
        break;
      case "frame": {
        const buf = new Uint32Array(msg.video);
        for (let i = 0; i < buf.length; i++) image32[i] = buf[i] | 0xff000000;
        ctx.putImageData(image, 0, 0);
        frames++;
        audioSamples += msg.audio.length / 2; // playback is milestone 3's job
        const now = performance.now();
        if (now - lastTick >= 1000) {
          status.textContent = `running — ${frames} fps, ${audioSamples} audio samples/s`;
          console.log(`emu fps: ${frames}`);
          frames = 0;
          audioSamples = 0;
          lastTick = now;
        }
        break;
      }
      case "stressResult":
        status.textContent =
          `stress: ${msg.frames} frames in ${msg.seconds.toFixed(2)}s = ` +
          `${(msg.frames / msg.seconds).toFixed(0)} fps throughput`;
        stressDone?.();
        break;
    }
  };
  worker.postMessage({ type: "load", rom: romBytes.buffer }, [romBytes.buffer]);

  addEventListener("keydown", (e) => {
    const name = KEYMAP[e.code];
    if (!name) return;
    buttons |= descriptor.buttons[name];
    sendInput();
    e.preventDefault();
  });
  addEventListener("keyup", (e) => {
    const name = KEYMAP[e.code];
    if (!name) return;
    buttons &= ~descriptor.buttons[name];
    sendInput();
    e.preventDefault();
  });

  // Mouse as stylus on the pointer screen.
  const pointer = (e, down) => {
    const r = canvas.getBoundingClientRect();
    const x = Math.floor((e.clientX - r.left) * (W / r.width));
    const y = Math.floor((e.clientY - r.top) * (H / r.height)) - pointerTop;
    touch = down && x >= 0 && x < W && y >= 0 && y < 192 ? { x, y } : null;
    sendInput();
  };
  canvas.addEventListener("pointerdown", (e) => { canvas.setPointerCapture(e.pointerId); pointer(e, true); });
  canvas.addEventListener("pointermove", (e) => { if (e.buttons) pointer(e, true); });
  canvas.addEventListener("pointerup", (e) => pointer(e, false));
}

document.getElementById("rom").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (file) start(new Uint8Array(await file.arrayBuffer()));
});

const params = new URLSearchParams(location.search);
const romUrl = params.get("rom");
if (romUrl) {
  status.textContent = `fetching ${romUrl}…`;
  const resp = await fetch(romUrl);
  if (!resp.ok) {
    status.textContent = `fetch failed: ${resp.status}`;
  } else {
    start(new Uint8Array(await resp.arrayBuffer()));
    // Hold the module's top-level await (and so the window load event)
    // open while work runs, so a headless `--screenshot` fires after it
    // and captures the status line.
    const bench = Number(params.get("bench"));
    if (bench > 0) await new Promise((r) => setTimeout(r, bench * 1000));
    const stress = Number(params.get("stress"));
    if (stress > 0) {
      await new Promise((r) => setTimeout(r, 2000)); // let it boot first
      const done = new Promise((r) => { stressDone = r; });
      worker.postMessage({ type: "stress", frames: stress });
      await done;
    }
  }
}
</script>
</body>
</html>
