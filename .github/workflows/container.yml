name: container

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Keyless cosign (D89, docs/worlds.md §publishing): the workflow's OIDC
  # identity signs what it pushes; certificates land in the Rekor log.
  id-token: write

# One publish at a time; a new push to main supersedes an in-flight run.
concurrency:
  group: container-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The flake gate: nextest, clippy -D warnings, fmt, web check + tests,
  # wasm lane. The publish job only runs once this passes.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      # Nix store cache over the GitHub Actions cache — check and publish
      # share store paths across runs (the wasm/crane trees are the win).
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      - name: Flake check
        run: nix flake check -L

  publish:
    needs: check
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: DeterminateSystems/nix-installer-action@v22

      # Same store cache as the check job: the publish build mostly
      # re-realizes what check already built this run.
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      # skopeo (via the flake's copyTo scripts) reads ~/.docker/config.json,
      # which this action writes.
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: nix build .#container

      # copyToRegistry pushes the flake-declared name:tag
      # (ghcr.io/schlarpc/datboi:latest); copyTo adds the per-commit tag.
      # Both carry the SOCI index push (OCI referrers) baked in by
      # push.soci.enable.
      - name: Push
        run: |
          nix run .#container.copyTo -- docker://ghcr.io/${{ github.repository }}:${{ github.sha }}
          nix run .#container.copyToRegistry

      # D89 (docs/worlds.md §publishing): the wkg-encoded WIT packages.
      # The publish gate inside the script refuses to overwrite an
      # existing version tag — published versions are immutable forever —
      # so re-runs are idempotent and only NEW versions surface as
      # PUBLISHED lines for the signing step below.
      - name: Publish WIT packages
        run: nix run .#publish-wit | tee wit-publish.log

      # No floating v4 tag exists upstream (only exact v4.x.y tags), so
      # this pin is exact by necessity, not preference.
      - uses: sigstore/cosign-installer@v4.1.2

      # Keyless: the run's OIDC identity is the key. Verifiable with
      #   cosign verify --certificate-identity-regexp \
      #     'github.com/schlarpc/datboi' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <ref>
      - name: Sign published artifacts
        run: |
          cosign sign --yes ghcr.io/${{ github.repository }}:${{ github.sha }}
          grep '^PUBLISHED ' wit-publish.log | cut -d' ' -f2 \
            | xargs -r -n1 cosign sign --yes
