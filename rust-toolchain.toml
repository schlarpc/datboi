# Single source of truth for the Rust toolchain.
#
# - Nix reads this via `rust-bin.fromRustupToolchainFile` in flake.nix, so the
#   exact build is still pinned/reproducible through rust-overlay in flake.lock.
# - Non-Nix users with rustup get the identical version automatically.
[toolchain]
channel = "1.96.1"
profile = "default"
components = ["rust-src", "rust-analyzer", "llvm-tools-preview"]
# unknown-unknown (not wasip2): transform components must import NOTHING
# (D5 empty-import determinism contract), and wasip2's std wires WASI shims
# into every component even when unused. Core modules from unknown-unknown
# are componentized with `wasm-tools component new` — no adapter, no imports.
targets = ["wasm32-unknown-unknown"]
